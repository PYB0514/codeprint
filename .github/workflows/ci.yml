name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  analyzer-version-guard:
    name: ANALYZER_VERSION Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ParsedFile.java(파싱 결과 스키마)가 바뀌었는데 CachedParsedFileLoader.java(ANALYZER_VERSION)가
      # 함께 안 바뀌면, 구버전 캐시 JSON이 신필드를 null로 역직렬화해 GraphBuilder가 NPE로 죽는다
      # (B-16 2026-07-10 · 반복-G 2026-07-17 재발 — 2회 다 프로덕션까지 영향, 상세는 ERROR_TRACKER.md 로컬 참조).
      # 오탐(단순 주석 수정 등)이어도 ANALYZER_VERSION을 한 번 더 올리는 건 안전한 조작(재파싱만 유발)이라
      # 과탐지 방향으로 설계한다.
      - name: ParsedFile 스키마 변경 시 ANALYZER_VERSION 동반 증가 확인
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/src/main/java/com/codeprint/infrastructure/analysis/ParsedFile.java | grep -q .; then
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/src/main/java/com/codeprint/infrastructure/analysis/CachedParsedFileLoader.java | grep -q .; then
              echo "::error::ParsedFile.java가 변경됐는데 CachedParsedFileLoader.java(ANALYZER_VERSION)는 변경되지 않았습니다."
              echo "::error::필드 추가/제거/의미 변경이면 ANALYZER_VERSION을 반드시 올리세요. 단순 주석/포맷 수정뿐이라도 CachedParsedFileLoader.java를 함께 커밋(예: 버전 상수 옆 주석 갱신)하면 이 검사를 통과합니다."
              exit 1
            fi
          fi

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # 통합 테스트(ParsedFileCacheIntegrationTest 등)가 실 Postgres에 Flyway+Hibernate validate를 돌린다 — 스키마 불일치 CI 게이트
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: codeprint
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build & Test
        run: ./gradlew test --no-daemon

  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b
