# 백엔드 내부 @Scheduled(App Sleeping을 막던 상시 트리거)를 대체하는 외부 cron
name: Scheduled Jobs

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 06:00 KST(UTC 21:00) — 오늘의 공개레포 갱신
    - cron: '0 0 * * *'   # 매일 09:00 KST(UTC 00:00) — 일일 다이제스트 발송
    - cron: '0 * * * *'   # 매시 정각 — G-5 웹훅 유실 리컨실리에이션
    # reconcile-stale-analyses 스케줄 제거(2026-07-25) — 15분마다 Serverless sleep을 방해해 가동률 ≈67%·콜드스타트 최대
    # 96회/일 유발(R36 #98, contexts/Context138.md). 실사용자 0명인 지금은 스테일 감지 지연의 실익이 거의 없어
    # workflow_dispatch 수동 실행으로만 전환 — 실사용자 유입 시 재평가.
  workflow_dispatch:
    inputs:
      job:
        description: '수동 실행할 작업'
        required: true
        type: choice
        options: [refresh-featured, daily-digest, reconcile-pr-gate, reconcile-stale-analyses]

jobs:
  refresh-featured:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'refresh-featured' || github.event.schedule == '0 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/refresh-featured
        run: |
          set -euo pipefail
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/cron/refresh-featured" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  daily-digest:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'daily-digest' || github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/daily-digest
        run: |
          set -euo pipefail
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/cron/daily-digest" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  reconcile-pr-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'reconcile-pr-gate' || github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/reconcile-pr-gate
        run: |
          set -euo pipefail
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/cron/reconcile-pr-gate" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  reconcile-stale-analyses:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'reconcile-stale-analyses'
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/reconcile-stale-analyses
        run: |
          set -euo pipefail
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/cron/reconcile-stale-analyses" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"
