spring:
  application:
    name: codeprint

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codeprint}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: read:user,user:email,repo

  async:
    executor:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 500

server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters}
  expiration-ms: 86400000  # 24h

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  pro-price-id: ${STRIPE_PRO_PRICE_ID:price_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

encryption:
  # 32바이트 AES-256 키를 Base64로 인코딩한 값. 운영 환경에서는 반드시 환경변수로 교체.
  key: ${ENCRYPTION_KEY:Y29kZXByaW50LWxvY2FsLWRldi1lbmNyeXB0LWtleSE=}

logging:
  level:
    com.codeprint: DEBUG
    org.springframework.security: INFO
