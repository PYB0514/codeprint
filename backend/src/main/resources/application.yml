spring:
  application:
    name: codeprint

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codeprint}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 트래픽이 적은 규모라 기본값(10)은 과함 — 유휴 커넥션을 줄여 상시 RAM 점유를 낮추고,
      # Railway Serverless(유휴 10분 기준 sleep)보다 짧게 반납해 sleep을 방해하지 않도록 함
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: false
        # 200ms 초과 쿼리를 WARN 레벨로 로깅 — Railway 로그에서 병목 쿼리 탐지용
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 200
        # 분석 그래프 저장 시 노드/엣지 INSERT를 배치 처리 (Node/Edge는 Persistable로 merge→persist 전환)
        # ★order_inserts는 의도적으로 끔 — edges.source_node_id가 nodes(id) FK이나 JPA 매핑 연관이 아닌 raw UUID라
        #   Hibernate가 의존성을 모르고 엔티티명순(Edge<Node)으로 재정렬 → edge가 node보다 먼저 INSERT → FK 위반 위험.
        jdbc.batch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: read:user,user:email,repo

  async:
    executor:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 500

server:
  port: 8080
  forward-headers-strategy: native
  compression:
    enabled: true
    mime-types: application/json,application/javascript,text/css,text/html,text/plain
    min-response-size: 1024

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters}
  expiration-ms: 3600000  # 1h — localStorage 저장이므로 탈취 시 노출 최소화

github:
  # GitHub webhook HMAC-SHA256 서명 검증 시크릿. 미설정 시 webhook 요청은 전부 거부됨.
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

cron:
  # GitHub Actions 스케줄 워크플로가 /api/cron/** 호출 시 보내는 공유 시크릿. 미설정 시 요청은 전부 거부됨.
  secret: ${CRON_SECRET:}

toss:
  client-key: ${TOSS_CLIENT_KEY:}
  secret-key: ${TOSS_SECRET_KEY:}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    bucket: ${AWS_S3_BUCKET:codeprint-uploads}
    region: ${AWS_S3_REGION:ap-northeast-2}

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: mailto:qkrdydqls999@gmail.com

encryption:
  # 32바이트 AES-256 키를 Base64로 인코딩한 값. 운영 환경에서는 반드시 환경변수로 교체.
  key: ${ENCRYPTION_KEY:Y29kZXByaW50LWxvY2FsLWRldi1lbmNyeXB0LWtleSE=}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never
    metrics:
      enabled: true

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1
  environment: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    com.codeprint: INFO
    org.springframework.security: WARN
